  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

) => this.setState({ isMobile: e.matches });\n    this._mq.addEventListener ? this._mq.addEventListener('change', this._mqHandler) : this._mq.addListener(this._mqHandler);\n  }\n\n  componentDidUpdate(prevProps) {\n    if (prevProps.accentColor !== this.props.accentColor) this._applyAccent();\n    if (prevProps.finnhubApiKey !== this.props.finnhubApiKey) this._startQuotes();\n  }\n\n  componentWillUnmount() {\n    clearInterval(this._typer);\n    clearTimeout(this._typerPause);\n    clearInterval(this._qTimer);\n    clearTimeout(this._swapTimer);\n    clearTimeout(this._countTimer);\n    clearInterval(this._counter);\n    clearTimeout(this._modalCloseTimer);\n    if (this._mq) { this._mq.removeEventListener ? this._mq.removeEventListener('change', this._mqHandler) : this._mq.removeListener(this._mqHandler); }\n  }\n\n  _applyAccent() {\n    document.body.style.setProperty('--accent', this.props.accentColor ?? '#9BC0A0');\n  }\n\n  _runTyper() {\n    const role = this.ROLES[this._roleIdx % this.ROLES.length];\n    let i = 0;\n    clearInterval(this._typer);\n    this._typer = setInterval(() => {\n      i++;\n      this.setState({ typed: role.slice(0, i) });\n      if (i >= role.length) {\n        clearInterval(this._typer);\n        this._typerPause = setTimeout(() => this._eraseTyper(role), 2500);\n      }\n    }, 60);\n  }\n\n  _eraseTyper(role) {\n    let i = role.length;\n    clearInterval(this._typer);\n    this._typer = setInterval(() => {\n      i--;\n      this.setState({ typed: role.slice(0, Math.max(0, i)) });\n      if (i <= 0) {\n        clearInterval(this._typer);\n        this._roleIdx++;\n        this._typerPause = setTimeout(() => this._runTyper(), 350);\n      }\n    }, 26);\n  }\n\n  _startCounts() {\n    if (this._countsDone) return;\n    this._countsDone = true;\n    const targets = { exp: 4, proj: 20, clients: 8, certs: 3 };\n    let s = 0;\n    this._counter = setInterval(() => {\n      s++;\n      const e = 1 - Math.pow(1 - Math.min(s / 60, 1), 3);\n      this.setState({ counts: { exp: Math.round(e * targets.exp), proj: Math.round(e * targets.proj), clients: Math.round(e * targets.clients), certs: Math.round(e * targets.certs) } });\n      if (s >= 60) clearInterval(this._counter);\n    }, 22);\n  }\n\n  _startQuotes() {\n    clearInterval(this._qTimer);\n    const key = (this.props.finnhubApiKey || '').trim();\n    if (!key) { this.setState({ quotes: null, updatedAt: null }); return; }\n    const load = async () => {\n      try {\n        const out = {};\n        await Promise.all(this.watchlist.map(async (r) => {\n          const res = await fetch('https://finnhub.io/api/v1/quote?symbol=' + r.t + '&token=' + encodeURIComponent(key));\n          const j = await res.json();\n          if (j && typeof j.c === 'number' && j.c > 0) out[r.t] = j.c;\n        }));\n        if (Object.keys(out).length) {\n          this.setState({ quotes: out, updatedAt: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) });\n        }\n      } catch (e) { /* keep manual prices */ }\n    };\n    load();\n    this._qTimer = setInterval(load, 60000);\n  }\n\n  openResumeModal() {\n    this.setState({ resumeModalOpen: true, resumeModalIn: false });\n    requestAnimationFrame(() => requestAnimationFrame(() => this.setState({ resumeModalIn: true })));\n  }\n\n  closeResumeModal() {\n    this.setState({ resumeModalIn: false });\n    clearTimeout(this._modalCloseTimer);\n    this._modalCloseTimer = setTimeout(() => this.setState({ resumeModalOpen: false }), 180);\n  }\n\n  goContactFromModal() {\n    this.closeResumeModal();\n    this.switchTab('contact');\n  }\n\n  switchTab(t) {\n    if (t === this.state.tab || this._switching) return;\n    this._switching = true;\n    this.setState({ leaving: true });\n    this._swapTimer = setTimeout(() => {\n      this._switching = false;\n      this.setState({ tab: t, leaving: false, entered: false });\n      requestAnimationFrame(() => requestAnimationFrame(() => this.setState({ entered: true })));\n      window.scrollTo(0, 0);\n    }, 160);\n  }\n\n  renderVals() {\n    const { tab, leaving, entered, typed, quotes, updatedAt, counts, resumeModalOpen, resumeModalIn, isMobile } = this.state;\n    const idx = { home: 0, resume: 1, portfolio: 2, travel: 3, contact: 4 }[tab];\n\n    const reveal = (i) => ({\n      opacity: entered ? 1 : 0,\n      transform: entered ? 'translateY(0)' : 'translateY(14px)',\n      transition: 'opacity .55s ease, transform .6s cubic-bezier(0.22,1,0.36,1)',\n      transitionDelay: (i * 80) + 'ms'\n    });\n\n    const tabDefs = [\n      { key: 'home', label: 'Home', icon: 'M3 10.5L12 3l9 7.5M5.5 9v11.5h13V9' },\n      { key: 'resume', label: 'Resume', icon: 'M6.5 3.5h7l4.5 4.5v12.5h-11.5zM13.5 3.5V8H18' },\n      { key: 'portfolio', label: 'Portfolio', icon: 'M3.5 20.5h17M4.5 16.5l4.5-4.5 3.5 3 6.5-7.5' },\n      { key: 'travel', label: 'Travel', icon: 'M12 3a9 9 0 1 0 0 18 9 9 0 0 0 0-18M3 12h18M12 3c-2.6 2.5-4 5.5-4 9s1.4 6.5 4 9c2.6-2.5 4-5.5 4-9s-1.4-6.5-4-9' },\n      { key: 'contact', label: 'Contact', icon: 'M4 5.5h16v13H4zM4.5 6l7.5 6.5L19.5 6' }\n    ];\n    const tabs = tabDefs.map((d) => ({\n      label: d.label,\n      icon: d.icon,\n      color: tab === d.key ? 'var(--accent, #9BC0A0)' : '#6C7078',\n      weight: tab === d.key ? 600 : 500,\n      go: () => this.switchTab(d.key)\n    }));\n\n    const rows = this.watchlist.map((r) => {\n      const cur = quotes && quotes[r.t] ? quotes[r.t] : r.cur;\n      const pct = ((cur - r.buy) / r.buy) * 100;\n      const up = pct >= 0;\n      return {\n        t: r.t, name: r.name, sector: r.sector,\n        buyF: '$' + r.buy.toFixed(2),\n        curF: '$' + cur.toFixed(2),\n        pct,\n        pctF: (up ? '↑ ' : '↓ ') + Math.abs(pct).toFixed(1) + '%',\n        chipColor: up ? '#34D399' : '#F87171'\n      };\n    });\n    const top5 = [...rows].sort((a, b) => b.pct - a.pct).slice(0, 5);\n    const tapeOnce = top5.map((s) => ({ t: s.t, pctF: (s.pct >= 0 ? '+' : '') + Math.abs(s.pct).toFixed(1) + '%', arrow: s.pct >= 0 ? '▲' : '▼', color: s.pct >= 0 ? '#34D399' : '#F87171' }));\n    const avg = rows.reduce((s, r) => s + r.pct, 0) / rows.length;\n\n    const marqueeBase = ['SERVICENOW', 'HRSD', 'AGENTIC AI', 'ENTERPRISE INTEGRATIONS', 'SAP SUCCESSFACTORS', 'ANAPLAN', 'AVATURE', 'FLOW DESIGNER', 'INTEGRATIONHUB', 'HIRE-TO-RETIRE', 'SAP FIELDGLASS', \"KNOWLEDGE '26\"];\n\n    return {\n      isHome: tab === 'home', isResume: tab === 'resume', isPortfolio: tab === 'portfolio', isTravel: tab === 'travel', isContact: tab === 'contact',\n      isMobile,\n      heroRowStyle: isMobile\n        ? { display: 'flex', flexDirection: 'column', alignItems: 'center', textAlign: 'center', gap: '28px' }\n        : { display: 'flex', gap: '40px', alignItems: 'flex-start', justifyContent: 'space-between' },\n      navWidth: isMobile ? '52px' : '62px',\n      navIconSize: isMobile ? '19' : '21',\n      mainPadLeft: isMobile ? '78px' : '94px',\n      headshotSize: isMobile ? '132px' : '184px',\n      justifyMobile: isMobile ? 'center' : 'flex-start',\n      isDesktopTable: !isMobile,\n      statsGridCols: isMobile ? '1fr' : 'minmax(130px,0.7fr) minmax(280px,2.1fr) minmax(130px,0.7fr)',\n      typed,\n      pageOpacity: leaving ? 0 : 1,\n      pageShift: leaving ? '6px' : '0px',\n      indicatorTransform: 'translateY(' + (idx * 100) + '%)',\n      r0: reveal(0), r1: reveal(1), r2: reveal(2), r3: reveal(3), r4: reveal(4), r5: reveal(5), r6: reveal(6), r7: reveal(7), r8: reveal(8),\n      tabs,\n      rows,\n      statNames: String(rows.length),\n      tickerTapeItems: [...tapeOnce, ...tapeOnce],\n      avgPct: (avg >= 0 ? '+' : '') + avg.toFixed(1) + '%',\n      avgColor: avg >= 0 ? '#34D399' : '#F87171',\n      statExp: counts.exp + '+',\n      statProj: counts.proj + '+',\n      statClients: String(counts.clients),\n      statCerts: String(counts.certs),\n      marqueeItems: [...marqueeBase, ...marqueeBase],\n      skillCats: [\n        { c oteStatus: quotes ? 'LIVE · UPDATED ' + updatedAt : 'MANUAL PRICES · ADD FINNHUB KEY IN TWEAKS FOR LIVE',\n      goResume: () => this.switchTab('resume'),\n      goContact: () => this.switchTab('contact'),\n      resumeModalOpen,\n      modalOpacity: resumeModalIn ? 1 : 0,\n      modalScale: resumeModalIn ? 'scale(1)' : 'scale(0.96)',\n      openResumeModal: () => this.openResumeModal(),\n      closeResumeModal: () => this.closeResumeModal(),\n      goContactFromModal: () => this.goContactFromModal(),\n      stopProp: (e) => e.stopPropagation(),\n      showMarquee: this.props.showMarquee ?? true\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
